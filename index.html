<!DOCTYPE html>
<html lang="ko">
<head>
  <meta property="og:title" content="새종로약국 | 마운자로 예약 현황">
  <meta property="og:description" content="마운자로 재고 및 예약 현황을 확인하세요.">
  <meta property="og:image" content="https://u.cubeupload.com/fddfsdafa/1da215.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>새종로약국 예약 시스템</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@latest/dist/web/static/pretendard.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #f0f4fa;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --line: #dce6f5;
      --line-strong: #c8d9f0;
      --text: #1a2540;
      --sub: #7a8fa8;
      --sub-2: #5c7490;

      --brand-blue: #426CB5;
      --brand-blue-dark: #2f5099;
      --brand-blue-soft: #e8eef9;
      --brand-blue-mid: #d0dcf5;
      --brand-yellow: #E9C84B;
      --brand-yellow-dark: #c9a830;
      --brand-yellow-soft: #fdf8e3;
      --brand-yellow-mid: #f5e9b0;

      --purple: #7b61ff;
      --purple-soft: #f4f1ff;
      --purple-mid: #d1c4e9;
      --purple-dark: #4527a0;

      --teal: #00b8d4;
      --teal-soft: #e0f7fa;
      --teal-mid: #b2ebf2;
      --teal-dark: #00838f;

      --pink: #e91e8c;
      --pink-soft: #fce4f3;
      --pink-mid: #f8bbd0;
      --pink-dark: #ad1457;

      --gray: #8b95a1;
      --gray-soft: #f2f4f6;
      --gray-mid: #d1d6db;
      --gray-dark: #333d4b;

      --shadow-card: 0 1px 2px rgba(66,108,181,0.04), 0 6px 20px rgba(66,108,181,0.07);
      --radius-xxl: 28px;
      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 14px;
    }

    body {
      margin: 0;
      /* Pretendard를 1순위로 */
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #eef3fb;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 460px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 28px 18px 56px;
    }

    .header-bg {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 300px;
      background: linear-gradient(160deg, var(--brand-blue) 0%, #3058a0 100%);
      z-index: 0;
      overflow: hidden;
    }
    .header-bg::before {
      content: '';
      position: absolute;
      top: -60px; right: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(233,200,75,0.20);
    }
    .header-bg::after {
      content: '';
      position: absolute;
      bottom: -50px; left: -50px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }

    /* ── 브랜드 헤더 ── */
    .brand { padding: 6px 2px 32px; }
    .brand-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 18px;
      letter-spacing: 0.3px;
      border: 1px solid rgba(255,255,255,0.30);
    }
    .brand h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -1.1px;
      color: #ffffff;
    }
    .brand h1 span { color: var(--brand-yellow); }
    .brand p {
      margin: 12px 0 0;
      font-size: 14.5px;
      line-height: 1.6;
      color: rgba(255,255,255,0.72);
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .section { margin-bottom: 18px; }

    .card {
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: var(--radius-xxl);
      padding: 24px 20px;
      box-shadow: var(--shadow-card);
    }

    .section-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: -0.7px;
    }
    .section-sub {
      margin: 6px 0 0;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.5;
      font-weight: 600;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.75); }
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── dose-card: 대기 없음(기본) vs 대기 있음(active) ── */
    .dose-card {
      background: var(--surface-soft);
      /* 기본: 얇고 연한 테두리 */
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px 16px 16px;
      min-height: 164px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: border-color .15s ease;
      /* 그림자 없음 */
      box-shadow: none;
    }
    .dose-card.active {
      /* 대기 있을 때: 파란 테두리만, 배경/그림자 변경 없음 */
      border: 1.5px solid var(--brand-blue);
      box-shadow: none;
      background: var(--surface-soft);
    }

    .dose-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 84px;
      height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.2px;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    }

    .p-25  { background: var(--gray-mid);   color: var(--gray-dark);   }
    .p-50  { background: var(--purple-mid); color: var(--purple-dark); }
    .p-75  { background: var(--teal-mid);   color: var(--teal-dark);   }
    .p-100 { background: var(--pink-mid);   color: var(--pink-dark);   }

    .wait-label {
      font-size: 13px;
      color: var(--sub);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .wait {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      line-height: 1;
    }
    .wait .num {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2.3px;
      color: #1B1F27;
    }
    .wait .txt {
      font-size: 15px;
      color: #1B1F27;
      font-weight: 700;
      padding-bottom: 8px;
    }

    .bar {
      height: 6px;
      background: var(--brand-blue-soft);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 14px;
    }
    .bar > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--brand-blue) 0%, #5a8fd8 100%);
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    .tiny-note {
      margin-top: 16px;
      font-size: 12.5px;
      color: var(--sub);
      line-height: 1.55;
      font-weight: 600;
      letter-spacing: -0.1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── 예약 조회 섹션 ── */
    .pane-title {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 800;
      letter-spacing: -0.8px;
    }
    .pane-sub {
      margin: 0 0 22px;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.5;
      font-weight: 600;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      margin-bottom: 9px;
      color: var(--brand-blue);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.2px;
    }

    .input {
      width: 100%;
      height: 54px;
      border: 1.5px solid var(--line-strong);
      border-radius: 16px;
      background: #fff;
      padding: 0 16px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      outline: none;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .input::placeholder { color: #b0bcc8; }
    .input:focus {
      border-color: var(--brand-blue);
      box-shadow: 0 0 0 4px rgba(66, 108, 181, 0.10);
    }

    .btn {
      width: 100%;
      height: 54px;
      border: 0;
      border-radius: 16px;
      background: var(--brand-blue);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.2px;
      cursor: pointer;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      transition: background .15s ease, transform .05s ease, box-shadow .15s ease;
      box-shadow: 0 4px 14px rgba(66,108,181,0.28);
    }
    .btn:hover {
      background: var(--brand-blue-dark);
      box-shadow: 0 6px 20px rgba(66,108,181,0.35);
    }
    .btn:active { transform: translateY(1px); }

    /* ── 조회 결과 영역 전체 감싸는 회색 박스 ── */
    .lookup-result-wrap {
      margin-top: 20px;
      background: #f2f5f9;
      border-radius: 20px;
      padding: 16px;
      border: 1px solid #e2e8f2;
    }

    .lookup-name-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
      padding: 12px 14px;
      background: var(--brand-blue-soft);
      border-radius: var(--radius-sm);
      border: 1px solid var(--brand-blue-mid);
    }
    .lookup-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.7px;
      color: var(--brand-blue);
    }
    .lookup-birth {
      font-size: 14px;
      font-weight: 600;
      color: var(--sub-2);
    }

    /* ── 예약 블록: 1열로 쌓기 ── */
    .booking-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .booking-block {
      background: #ffffff;
      border: 1px solid #dce6f5;
      border-radius: 16px;
      padding: 14px 16px;
      position: relative;
    }

    /* 상태 뱃지 — 우측 상단 */
    .booking-status-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .booking-status-badge.s-waiting { background: #fff0f0; color: #e53935; }
    .booking-status-badge.s-ready   { background: #e8f8f0; color: #1a9c55; }
    .booking-status-badge.s-done    { background: #f2f4f6; color: #8b95a1; }

    /* 용량 크게 */
    .booking-dose {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      padding-right: 80px; /* 뱃지랑 안 겹치게 */
    }

    /* 예약날짜 + 수량 한 줄 */
    .booking-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--sub-2);
      margin-bottom: 10px;
    }
    .booking-meta-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--sub);
      flex-shrink: 0;
    }

    /* 몇번째 순서 표시 — 블록 하단 */
    .booking-rank {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #edf1f8;
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
    }
    .booking-rank-num {
      font-size: 13px;
      font-weight: 800;
      color: var(--brand-blue);
    }
    /* 수령완료 or 수령가능이면 순서 표시 다르게 */
    .booking-rank.done {
      color: #8b95a1;
    }

    .no-result {
      margin-top: 18px;
      padding: 22px 16px;
      border-radius: 18px;
      background: var(--brand-blue-soft);
      border: 1px solid var(--brand-blue-mid);
      text-align: center;
    }
    .no-result p {
      margin: 0;
      color: var(--sub-2);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.7;
    }

    /* ── 카드 상단 컬러 헤더 ── */
    .card-header-blue {
      margin: -24px -20px 22px;
      padding: 18px 22px;
      background: var(--brand-blue);
      border-radius: 28px 28px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-header-blue .section-title { color: #fff; margin: 0; }
    .card-header-blue .section-sub   { color: rgba(255,255,255,0.72); margin: 4px 0 0; }

    .live-chip-white {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.28);
    }
    .live-chip-white .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--brand-yellow);
      animation: pulse 1.8s ease-in-out infinite;
      display: inline-block;
    }

    .card-header-yellow {
      margin: -24px -20px 22px;
      padding: 18px 22px;
      background: var(--brand-yellow);
      border-radius: 28px 28px 0 0;
    }
    .card-header-yellow .pane-title { color: #3a2800; margin: 0 0 4px; }
    .card-header-yellow .pane-sub   { color: rgba(58,40,0,0.65); margin: 0; }

    @media (max-width: 390px) {
      .wrap { padding: 22px 14px 40px; }
      .grid { grid-template-columns: 1fr 1fr; }
      .brand h1 { font-size: 27px; }
      .section-title { font-size: 20px; }
      .pane-title { font-size: 20px; }
      .wait .num { font-size: 46px; }
    }
  </style>
</head>
<body>
  <div class="header-bg"></div>
  <div class="wrap">

    <!-- 헤더 -->
    <header class="brand">
      <div class="brand-badge">마운자로 대기 현황</div>
      <h1>새종로 약국<br><span>예약 현황</span>을<br>바로 확인하세요.</h1>
      <p>새종로약국 마운자로 예약 현황 페이지입니다. 실시간 대기 현황을 확인하고, 본인 확인 정보로 예약 내역을 조회할 수 있습니다.</p>
    </header>

    <!-- 실시간 대기 현황 -->
    <section class="section">
      <div class="card">
        <div class="card-header-blue">
          <div>
            <h2 class="section-title">실시간 대기 현황</h2>
            <p class="section-sub">용량별 현재 대기 인원을 확인할 수 있습니다.</p>
          </div>
          <div class="live-chip-white"><span class="dot"></span> 실시간</div>
        </div>

        <div class="grid" id="doseGrid"></div>
        <div class="tiny-note" id="lastUpdated">
          <span>🔄</span>
          <span>구글 시트에서 실시간으로 불러옵니다.</span>
        </div>
      </div>
    </section>

    <!-- 예약 조회 -->
    <section class="section">
      <div class="card">
        <div class="card-header-yellow">
          <h2 class="pane-title">예약내역 바로 조회</h2>
          <p class="pane-sub">아래 정보를 모두 입력하시면 예약 현황을 확인할 수 있습니다.</p>
        </div>

        <div class="field">
          <label for="lookupName">이름</label>
          <input id="lookupName" class="input" type="text" placeholder="홍길동" autocomplete="off" />
        </div>

        <div class="field">
          <label for="lookupBirth">생년월일 6자리</label>
          <input id="lookupBirth" class="input" type="text" placeholder="990101" maxlength="6" inputmode="numeric" autocomplete="off" />
        </div>

        <div class="field">
          <label for="lookupPhone">핸드폰 뒷자리 4자리</label>
          <input id="lookupPhone" class="input" type="text" placeholder="1234" maxlength="4" inputmode="numeric" autocomplete="off" />
        </div>

        <button class="btn" id="lookupBtn">조회하기</button>

        <div id="lookupResultArea"></div>
      </div>
    </section>

  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyGNbnKgci-cjE2CNpHdR5V9l-FcmTuvUfZJxRXcnzR-4glBpyn2qlOTR8tBQ1BBxYW/exec';

    let doseData = [
      { dose: '2.5mg', wait: 0, cls: 'p-25' },
      { dose: '5.0mg', wait: 0, cls: 'p-50' },
      { dose: '7.5mg', wait: 0, cls: 'p-75' },
      { dose: '10mg',  wait: 0, cls: 'p-100' }
    ];

    const doseGrid = document.getElementById('doseGrid');

    // ── 유틸 ──────────────────────────────────────────
    function statusClass(status) {
      if (status === '수령 가능') return 's-ready';
      if (status === '수령 완료') return 's-done';
      return 's-waiting';
    }

    function doseColor(dose) {
      if (dose === '2.5mg') return '#8b95a1';
      if (dose === '5.0mg') return '#7b61ff';
      if (dose === '7.5mg') return '#00b8d4';
      if (dose === '10mg')  return '#e91e8c';
      return 'var(--text)';
    }

    // ── 대기 현황 렌더 ─────────────────────────────────
    function renderDoseGrid() {
      doseGrid.innerHTML = '';
      const maxWait = Math.max(...doseData.map(x => x.wait), 1);
      doseData.forEach(item => {
        const percent = item.wait === 0 ? 0 : Math.max(8, Math.round((item.wait / maxWait) * 100));
        const card = document.createElement('div');
        card.className = 'dose-card' + (item.wait > 0 ? ' active' : '');
        card.innerHTML = `
          <div>
            <div class="dose-top">
              <span class="pill ${item.cls}">${item.dose}</span>
            </div>
            <div class="wait-label">현재 대기</div>
            <div class="wait">
              <span class="num">${item.wait}</span>
              <span class="txt">명</span>
            </div>
          </div>
          <div class="bar"><span style="width:${percent}%"></span></div>
        `;
        doseGrid.appendChild(card);
      });
    }

    // ── 대기 현황 fetch ────────────────────────────────
    async function fetchWaitStatus() {
      try {
        const res  = await fetch(GAS_URL + '?action=getWaitStatus');
        const data = await res.json();
        if (data.success && data.waitData) {
          data.waitData.forEach(row => {
            const target = doseData.find(d => d.dose === row.dose);
            if (target) target.wait = Number(row.wait) || 0;
          });
          renderDoseGrid();
          document.getElementById('lastUpdated').innerHTML =
            '<span>🔄</span><span>마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR') + '</span>';
        }
      } catch(e) {
        console.warn('대기 현황 불러오기 실패', e);
        document.getElementById('lastUpdated').innerHTML =
          '<span>⚠️</span><span>데이터를 불러오지 못했습니다. 잠시 후 자동으로 재시도합니다.</span>';
      }
    }

    // ── 예약 조회 ──────────────────────────────────────
    async function lookupReservation() {
      const name  = document.getElementById('lookupName').value.trim();
      const birth = document.getElementById('lookupBirth').value.trim();
      const phone = document.getElementById('lookupPhone').value.trim();
      const area  = document.getElementById('lookupResultArea');

      if (!name || !birth || !phone) {
        area.innerHTML = '<div class="no-result"><p>이름, 생년월일 6자리, 핸드폰 뒷자리 4자리를<br>모두 입력해 주세요.</p></div>';
        return;
      }
      if (!/^\d{6}$/.test(birth)) {
        area.innerHTML = '<div class="no-result"><p>생년월일은 6자리 숫자로 입력해 주세요.<br>예: 990101</p></div>';
        return;
      }
      if (!/^\d{4}$/.test(phone)) {
        area.innerHTML = '<div class="no-result"><p>핸드폰 뒷자리는 4자리 숫자로 입력해 주세요.<br>예: 1234</p></div>';
        return;
      }

      area.innerHTML = '<div class="no-result"><p>조회 중...</p></div>';

      try {
        const url = GAS_URL + '?action=lookupReservation'
          + '&name='  + encodeURIComponent(name)
          + '&birth=' + encodeURIComponent(birth)
          + '&phone=' + encodeURIComponent(phone);
        const res  = await fetch(url);
        const data = await res.json();

        if (!data.success || !data.results || data.results.length === 0) {
          area.innerHTML = '<div class="no-result"><p>입력하신 정보와 일치하는 예약 내역이 없습니다.<br>이름, 생년월일, 핸드폰 뒷자리를 다시 확인해 주세요.</p></div>';
          return;
        }

        renderLookupResult(name, birth, data.results);
      } catch(e) {
        area.innerHTML = '<div class="no-result"><p>조회 중 오류가 발생했습니다.<br>잠시 후 다시 시도해 주세요.</p></div>';
        console.error(e);
      }
    }

    // ── 조회 결과 렌더 ─────────────────────────────────
    function renderLookupResult(name, birth, results) {
      const area = document.getElementById('lookupResultArea');

      const blocks = results.map(function(r) {
        const sc = statusClass(r.status);
        const dc = doseColor(r.dose);

        // 몇번째 순서 표시
        let rankHtml = '';
        if (r.status === '입고 대기 중') {
          // rank: 1-based (0 이하면 표시 안 함)
          const rankNum = (typeof r.rank === 'number' && r.rank >= 1) ? r.rank : null;
          if (rankNum !== null) {
            rankHtml = `
              <div class="booking-rank">
                <span>🔢</span>
                <span>대기 순서</span>
                <span class="booking-rank-num">${rankNum}번째</span>
              </div>`;
          }
        } else if (r.status === '수령 가능') {
          rankHtml = `<div class="booking-rank"><span>✅</span><span>수령 가능합니다</span></div>`;
        } else if (r.status === '수령 완료') {
          rankHtml = `<div class="booking-rank done"><span>📦</span><span>수령이 완료되었습니다</span></div>`;
        }

        return `
          <div class="booking-block">
            <span class="booking-status-badge ${sc}">${r.status}</span>
            <div class="booking-dose" style="color:${dc};">${r.dose}</div>
            <div class="booking-meta">
              <span>${r.date || '날짜 미정'}</span>
              <span class="booking-meta-sep"></span>
              <span>수량 ${r.qty || 1}개</span>
            </div>
            ${rankHtml}
          </div>`;
      }).join('');

      // 생년월일: 점 없이 숫자 그대로 표시
      area.innerHTML = `
        <div class="lookup-result-wrap">
          <div class="lookup-name-row">
            <span class="lookup-name">${name}</span>
            <span class="lookup-birth">님 (${birth})</span>
          </div>
          <div class="booking-list">
            ${blocks}
          </div>
        </div>`;
    }

    // ── 이벤트 ────────────────────────────────────────
    document.getElementById('lookupBtn').addEventListener('click', lookupReservation);

    ['lookupName', 'lookupBirth', 'lookupPhone'].forEach(function(id) {
      document.getElementById(id).addEventListener('keydown', function(e) {
        if (e.key === 'Enter') lookupReservation();
      });
    });

    ['lookupBirth', 'lookupPhone'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '');
      });
    });

    // ── 초기 실행 ─────────────────────────────────────
    renderDoseGrid();
    fetchWaitStatus();
    setInterval(fetchWaitStatus, 60000);
  </script>
</body>
</html>
